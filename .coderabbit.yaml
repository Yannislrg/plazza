# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "fr-FR"
reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: false
  auto_review:
    drafts: true
  finishing_touches:
    docstrings:
      enabled: false
  path_filters:
    - "!**/node_modules/**"
    - "!**/.github/**"
    - "!**/.vscode/**"
    - "!**/images/**"
    - "!**/*.svg"
    - "!**/*.png"
  path_instructions:
    - path: "**/*.cpp"
      instructions: |
        Le sujet complet du projet est disponible dans `doc/subject.md`. Lis-le avant chaque review.
        À chaque PR, vérifie que le code est bien en accord avec les exigences du sujet : architecture, encapsulations obligatoires, contraintes des cuisines, gestion des pizzas, IPC, réception interactive.
    - path: "**/*.hpp"
      instructions: |
        Le sujet complet du projet est disponible dans `doc/subject.md`. Lis-le avant chaque review.
        Vérifie que les headers respectent les contraintes d'encapsulation et les définitions imposées par le sujet (enums, classes, IPC).

    - path: "Makefile"
      instructions: |
        Vérifie que le Makefile contient bien les règles `all`, `re`, `clean` et `fclean` comme exigé par le sujet.
        Le binaire produit doit s'appeler `plazza`.
