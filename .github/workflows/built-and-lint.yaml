name: build and mirror

on:
  push:
    branches:
      - "main"
  pull_request:
    branches-ignore:
      - "ga-ignore-*"

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: apt-get update && apt-get install -y clang-format-20

      - name: Configure
        run: cmake -B build

      - name: Check formatting
        run: cmake --build build --target format-check

  build:
    name: Build
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plazza-binary
          path: |
            plazza
          if-no-files-found: warn

  test:
    name: Test
    runs-on: ubuntu-latest
    container: epitechcontent/epitest-docker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DBUILD_TESTS=ON

      - name: Build tests
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  push_to_mirror:
    name: Push to Mirror Repository
    runs-on: ubuntu-latest
    needs: [format-check, build, test]
    if: ${{ github.event_name == 'push' }}

    env:
      MIRROR_URL: "git@github.com:EpitechPGE2-2025/G-CCP-400-NAN-4-1-theplazza-6.git"

    steps:
      - name: Check if repository is a mirror
        id: is_mirror_repo
        run: |
          REPO_PATH=$(echo "${{ github.repositoryUrl }}" | sed -E 's|^git://github.com/(.+)\.git$|\1|')
          MIRROR_PATH=$(echo "${{ env.MIRROR_URL }}" | sed -E 's|^git@github.com:(.+)\.git$|\1|')

          if [[ "$REPO_PATH" == "$MIRROR_PATH" ]]; then
            echo "is_mirror=true" >> $GITHUB_OUTPUT
          else
            echo "is_mirror=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH for mirror push
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        env:
          SSH_KEY: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Filter .claude/ from history and push to mirror
        if: ${{ steps.is_mirror_repo.outputs.is_mirror == 'false' }}
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no"
        run: |
          pip install --quiet git-filter-repo
          git filter-repo --force --path .claude --invert-paths
          git remote add mirror "${{ env.MIRROR_URL }}"
          git push --force --mirror mirror
